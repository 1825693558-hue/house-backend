# ============================================================
# GitHub Actions - Backend Docker 镜像自动构建
# 触发条件: push 到 main 分支
# 功能: 构建后端镜像 → 推送到 Docker Hub → 通知服务器更新
# ============================================================

name: Build and Push Backend Image

on:
  push:
    branches: [main, master]

env:
  REGISTRY: docker.io
  IMAGE_NAME: ${{ secrets.DOCKER_USERNAME }}/ai-house-backend

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Trigger server update
        if: ${{ secrets.WEBHOOK_URL != '' }}
        run: |
          curl -X POST ${{ secrets.WEBHOOK_URL }} \
            -H "Authorization: Bearer ${{ secrets.WEBHOOK_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{"service":"backend","image":"${{ env.IMAGE_NAME }}:latest"}'